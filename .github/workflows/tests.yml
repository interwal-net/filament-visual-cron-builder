name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['12', '13']
        filament: ['4', '5']
        include:
          - laravel: '12'
            testbench: '^10.0'
          - laravel: '13'
            testbench: '^11.0'
        exclude:
          - php: '8.2'
            laravel: '13'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Filament ${{ matrix.filament }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/contracts:^${{ matrix.laravel }}.0" "filament/forms:^${{ matrix.filament }}.0" --no-interaction --no-update
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" "filament/filament:^${{ matrix.filament }}.0" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run Pest
        run: vendor/bin/pest
